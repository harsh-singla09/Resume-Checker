<!DOCTYPE html>
<html>

<head>

    <title>AI Resume Checker</title>

    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


<div class="main-container">


    <div class="card resume-card">


        <h1>
            🚀 AI Resume Checker
        </h1>


        <p class="subtitle">
            Analyze your resume with AI and compare it with your dream job.
        </p>


        <form action="/submit" method="POST" enctype="multipart/form-data">


            <div class="input-box">

                <label>
                    Email Address
                </label>

                <input 
                type="email"
                name="email"
                placeholder="Enter your email"
                required>

            </div>



            <div class="input-box">


                <label>
                    Upload Resume
                </label>


                <input 
                type="file"
                name="resume"
                accept=".pdf,.docx"
                required>


            </div>




            <div class="input-box">


                <label>
                    Job Description
                </label>


                <textarea

                name="job_description"

                rows="6"

                placeholder="Paste job description here..."
                
                required>

                </textarea>


            </div>



            <button type="submit">

                Analyze Resume 🔍

            </button>



        </form>



    </div>


</div>



</body>

</html>
